<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Information Lookup</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lobster&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: #03396c;
            padding: 20px;
            min-height: 100vh;
            color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            text-align: center;
        }
        .sidebar h1 {
            font-family: 'Lobster', cursive;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .sidebar nav a {
            display: block;
            color: #fff;
            text-decoration: none;
            margin: 10px 0;
            font-weight: bold;
            transition: color 0.3s;
        }
        .sidebar nav a:hover {
            color: #ff9a8d;
        }
        .content {
            margin-left: 250px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.9);
        }
        .container, .stock-week {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: 45%;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
            font-size: 16px;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Stock Tracker</h1>
        <nav>
            <a href="#lookup">Stock Lookup</a>
            <a href="#stock-week">Stock of the Week</a>
        </nav>
    </div>

    <div class="content">
        <div class="stock-week" id="stock-week">
            <h2>Stock of the Week</h2>
            <p>This section is manually updated weekly via the repository.</p>
            <table>
                <tr><th>Ticker</th><th>Details</th></tr>
                <tr><td>Example 1</td><td>Market Cap: $500M, New Highs: 250</td></tr>
                <tr><td>Example 2</td><td>Market Cap: $800M, New Highs: 320</td></tr>
            </table>
        </div>
        
        <div class="container" id="lookup">
            <h2>Stock Information Lookup</h2>
            <input type="text" id="ticker" placeholder="Enter Ticker">
            <button onclick="fetchStockData()">Get Stock Info</button>
            <table id="stockTable"></table>
        </div>
    </div>

    <script>
        const stockData = {
            "COST": {"Market Cap": 456.47, "Shares": 308417, "$Vol": 3428.4, "Relative Volume StDev": 2.08, "NewHighs": 5230, "Score": 31.1},
            "AMZN": {"Market Cap": 1249686, "Shares": 10297792059, "$Vol": 108620, "Relative Volume StDev": 1.19, "NewHighs": 163, "Score": 61.2},
            "AAPL": {"Market Cap": 3692658, "Shares": 15002720379, "$Vol": 13420.9, "Relative Volume StDev": 1.19, "NewHighs": 986, "Score": 40.7}
        };

        function fetchStockData() {
            let ticker = document.getElementById("ticker").value.toUpperCase();
            let table = document.getElementById("stockTable");
            table.innerHTML = "";
            
            if (stockData[ticker]) {
                let data = stockData[ticker];
                let html = `<tr><th>Metric</th><th>Value</th></tr>`;
                for (let key in data) {
                    html += `<tr><td>${key}</td><td>${data[key]}</td></tr>`;
                }
                table.innerHTML = html;
            } else {
                table.innerHTML = "<tr><td colspan='2'>No data found for this ticker</td></tr>";
            }
        }
    </script>
</body>
</html>
