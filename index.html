<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Information Lookup</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            color: #333;
        }
        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            padding-top: 20px;
            position: fixed;
        }
        .sidebar h2 {
            text-align: center;
            font-size: 22px;
        }
        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
            text-align: center;
            font-size: 18px;
        }
        .sidebar a:hover {
            background: #1a252f;
        }
        .content {
            margin-left: 260px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
        }
        .container, .stock-week {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            width: 45%;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            width: 80%;
            font-size: 16px;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
        .image-section img {
            width: 100%;
            max-width: 500px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Stock Tracker</h2>
        <a href="#lookup">Stock Lookup</a>
        <a href="#stock-week">StockofWeek.html</a>
    </div>

    <div class="content">
        <div class="stock-week" id="stock-week">
            <h2>StockofWeek.html</h2>
            <p>This section is manually updated weekly via the repository.</p>
            <table>
                <tr><th>Ticker</th><th>Details</th></tr>
                <tr><td>Example 1</td><td>Market Cap: $500M, New Highs: 250</td></tr>
                <tr><td>Example 2</td><td>Market Cap: $800M, New Highs: 320</td></tr>
            </table>
        </div>
        
        <div class="container" id="lookup">
            <h2>Stock Information Lookup</h2>
            <input type="text" id="ticker" placeholder="Enter Ticker">
            <button onclick="fetchStockData()">Get Stock Info</button>
            <table id="stockTable"></table>
        </div>
    </div>

    <script>
        const stockData = {
            "COST": {"Market Cap": 456.47, "Shares": 308417, "$Vol": 3428.4, "Relative Volume StDev": 2.08, "NewHighs": 5230, "Score": 31.1},
            "AMZN": {"Market Cap": 1249686, "Shares": 10297792059, "$Vol": 108620, "Relative Volume StDev": 1.19, "NewHighs": 163, "Score": 61.2},
            "AAPL": {"Market Cap": 3692658, "Shares": 15002720379, "$Vol": 13420.9, "Relative Volume StDev": 1.19, "NewHighs": 986, "Score": 40.7}
        };

        function fetchStockData() {
            let ticker = document.getElementById("ticker").value.toUpperCase();
            let table = document.getElementById("stockTable");
            table.innerHTML = "";
            
            if (stockData[ticker]) {
                let data = stockData[ticker];
                let html = `<tr><th>Metric</th><th>Value</th></tr>`;
                for (let key in data) {
                    html += `<tr><td>${key}</td><td>${data[key]}</td></tr>`;
                }
                table.innerHTML = html;
            } else {
                table.innerHTML = "<tr><td colspan='2'>No data found for this ticker</td></tr>";
            }
        }
    </script>
</body>
</html>
